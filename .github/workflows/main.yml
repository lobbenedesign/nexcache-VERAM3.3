name: NexCache CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential liblz4-dev libzstd-dev libssl-dev pkg-config

    - name: Build NexCache
      run: |
        # Usiamo il Makefile corretto che ora vede tutti gli oggetti (OBJS)
        # e forziamo l'architettura per sbloccare SIMD
        make clean
        make all CFLAGS="-O3 -march=haswell -std=c11 -D_GNU_SOURCE -Isrc -Isrc/memory -Isrc/core -Isrc/vector -Isrc/hashtable -Isrc/segcache -Isrc/crdt -Isrc/bloom"

    - name: Run Tests
      run: |
        ./build/test_arena
        ./build/test_core_v2
        ./build/test_v4
